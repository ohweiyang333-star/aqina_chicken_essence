name: Deploy Firestore Rules and Indexes

on:
  push:
    branches: [ main ]
    paths:
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
      - '.github/workflows/deploy-firestore.yml'
      - 'deployment-targets.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Firebase Project
        id: resolve
        run: |
          PROJECT=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.firebaseHosting?.projectId || cfg.frontend?.projectId || cfg.backend?.projectId || '')")
          if [ -z "$PROJECT" ]; then
            echo "Missing Firebase projectId in deployment-targets.json"
            exit 1
          fi
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"

      - name: Google Auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore Rules
        run: firebase deploy --only firestore:rules --project "${{ steps.resolve.outputs.project }}" --non-interactive

      - name: Deploy Firestore Indexes
        run: firebase deploy --only firestore:indexes --project "${{ steps.resolve.outputs.project }}" --non-interactive

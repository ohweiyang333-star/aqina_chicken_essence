name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'deployment-targets.json'
  workflow_dispatch:

env:
  PROJECT_ID: aqina-chicken-essence
  REGION: asia-southeast1
  SERVICE_NAME: aqina-backend-api
  IMAGE_NAME: asia-southeast1-docker.pkg.dev/aqina-chicken-essence/aqina-repo/backend
  BACKEND_BASE_URL: 'https://aqina-backend-api-c3amale25a-as.a.run.app'
  FRONTEND_BASE_URL: 'https://aqina-frontend-c3amale25a-as.a.run.app'
  FIREBASE_STORAGE_BUCKET: 'aqina-chicken-essence.firebasestorage.app'
  CORS_ORIGINS: '["https://aqina-frontend-c3amale25a-as.a.run.app","https://aqina-frontend-v2-c3amale25a-as.a.run.app"]'
  CLOUD_TASKS_LOCATION: asia-southeast1
  CLOUD_TASKS_EVENTS_QUEUE: marketing-events
  CLOUD_TASKS_FOLLOWUPS_QUEUE: marketing-followups
  CLOUD_TASKS_CAMPAIGNS_QUEUE: whatsapp-campaigns

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Deployment Target
        id: resolve
        run: |
          PLATFORM=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.platform || 'cloud_run')")
          PROJECT=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.projectId || '${{ env.PROJECT_ID }}')")
          REGION=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.region || '${{ env.REGION }}')")
          SERVICE=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.service || '${{ env.SERVICE_NAME }}')")
          IMAGE=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.image || '${{ env.IMAGE_NAME }}')")
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Skip Non-Cloud-Run Backend
        if: steps.resolve.outputs.platform != 'cloud_run'
        run: echo "Backend target is '${{ steps.resolve.outputs.platform }}'. Skipping Cloud Run deploy."

      - name: Google Auth
        if: steps.resolve.outputs.platform == 'cloud_run'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        if: steps.resolve.outputs.platform == 'cloud_run'
        uses: google-github-actions/setup-gcloud@v2

      - name: Select GCP Project
        if: steps.resolve.outputs.platform == 'cloud_run'
        run: gcloud config set project ${{ steps.resolve.outputs.project }}

      - name: Authorize Docker
        if: steps.resolve.outputs.platform == 'cloud_run'
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      - name: Ensure Cloud Tasks Queues
        if: steps.resolve.outputs.platform == 'cloud_run'
        id: cloudtasks
        run: |-
          ensure_queue() {
            QUEUE_NAME="$1"
            RATE="$2"
            CONCURRENCY="$3"
            if ! gcloud tasks queues describe "$QUEUE_NAME" --location "${CLOUD_TASKS_LOCATION}" --project "${{ steps.resolve.outputs.project }}" >/dev/null 2>&1; then
              gcloud tasks queues create "$QUEUE_NAME" \
                --location "${CLOUD_TASKS_LOCATION}" \
                --project "${{ steps.resolve.outputs.project }}" \
                --max-dispatches-per-second="$RATE" \
                --max-concurrent-dispatches="$CONCURRENCY"
            fi
          }

          set +e
          ensure_queue "${CLOUD_TASKS_EVENTS_QUEUE}" 5 5
          EVENTS_STATUS=$?
          ensure_queue "${CLOUD_TASKS_FOLLOWUPS_QUEUE}" 1 2
          FOLLOWUPS_STATUS=$?
          ensure_queue "${CLOUD_TASKS_CAMPAIGNS_QUEUE}" 0.2 1
          CAMPAIGNS_STATUS=$?
          set -e

          if [ "$EVENTS_STATUS" -eq 0 ] && [ "$FOLLOWUPS_STATUS" -eq 0 ] && [ "$CAMPAIGNS_STATUS" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "::warning::Cloud Tasks queue setup failed. Backend will deploy with CLOUD_TASKS_ENABLED=false. Grant Cloud Tasks Admin to the GitHub Actions service account, then rerun this workflow."
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and Push Container
        if: steps.resolve.outputs.platform == 'cloud_run'
        run: |-
          docker build -t ${{ steps.resolve.outputs.image }}:${{ github.sha }} ./backend
          docker push ${{ steps.resolve.outputs.image }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        if: steps.resolve.outputs.platform == 'cloud_run'
        env:
          META_VERIFY_TOKEN: ${{ secrets.META_VERIFY_TOKEN }}
          META_APP_SECRET: ${{ secrets.META_APP_SECRET }}
          META_PAGE_ACCESS_TOKEN: ${{ secrets.META_PAGE_ACCESS_TOKEN }}
          META_PAGE_ID: ${{ secrets.META_PAGE_ID }}
          META_WHATSAPP_ACCESS_TOKEN: ${{ secrets.META_WHATSAPP_ACCESS_TOKEN }}
          META_WHATSAPP_PHONE_NUMBER_ID: ${{ secrets.META_WHATSAPP_PHONE_NUMBER_ID }}
          META_WHATSAPP_BUSINESS_ACCOUNT_ID: ${{ secrets.META_WHATSAPP_BUSINESS_ACCOUNT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          INTERNAL_TASK_SECRET: ${{ secrets.INTERNAL_TASK_SECRET }}
        run: |-
          BACKEND_ENV_VARS="^|^FIREBASE_PROJECT_ID=${{ steps.resolve.outputs.project }}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|FIREBASE_STORAGE_BUCKET=${FIREBASE_STORAGE_BUCKET}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|ENVIRONMENT=production"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|CORS_ORIGINS=${CORS_ORIGINS}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|BACKEND_BASE_URL=${BACKEND_BASE_URL}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|FRONTEND_BASE_URL=${FRONTEND_BASE_URL}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|CLOUD_TASKS_ENABLED=${{ steps.cloudtasks.outputs.enabled }}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|CLOUD_TASKS_PROJECT_ID=${{ steps.resolve.outputs.project }}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|CLOUD_TASKS_LOCATION=${CLOUD_TASKS_LOCATION}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|CLOUD_TASKS_EVENTS_QUEUE=${CLOUD_TASKS_EVENTS_QUEUE}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|CLOUD_TASKS_FOLLOWUPS_QUEUE=${CLOUD_TASKS_FOLLOWUPS_QUEUE}"
          BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|CLOUD_TASKS_CAMPAIGNS_QUEUE=${CLOUD_TASKS_CAMPAIGNS_QUEUE}"

          add_secret_env() {
            key="$1"
            value="$2"
            if [ -n "$value" ]; then
              BACKEND_ENV_VARS="${BACKEND_ENV_VARS}|${key}=${value}"
            fi
          }

          add_secret_env META_VERIFY_TOKEN "${META_VERIFY_TOKEN}"
          add_secret_env META_APP_SECRET "${META_APP_SECRET}"
          add_secret_env META_PAGE_ACCESS_TOKEN "${META_PAGE_ACCESS_TOKEN}"
          add_secret_env META_PAGE_ID "${META_PAGE_ID}"
          add_secret_env META_WHATSAPP_ACCESS_TOKEN "${META_WHATSAPP_ACCESS_TOKEN}"
          add_secret_env META_WHATSAPP_PHONE_NUMBER_ID "${META_WHATSAPP_PHONE_NUMBER_ID}"
          add_secret_env META_WHATSAPP_BUSINESS_ACCOUNT_ID "${META_WHATSAPP_BUSINESS_ACCOUNT_ID}"
          add_secret_env GEMINI_API_KEY "${GEMINI_API_KEY}"
          add_secret_env INTERNAL_TASK_SECRET "${INTERNAL_TASK_SECRET}"

          gcloud run deploy ${{ steps.resolve.outputs.service }} \
            --image ${{ steps.resolve.outputs.image }}:${{ github.sha }} \
            --region ${{ steps.resolve.outputs.region }} \
            --platform managed \
            --allow-unauthenticated \
            --update-env-vars "${BACKEND_ENV_VARS}"

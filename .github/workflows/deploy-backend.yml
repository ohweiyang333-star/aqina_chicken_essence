name: Deploy Backend to Cloud Run

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
      - 'deployment-targets.json'
  workflow_dispatch:

env:
  PROJECT_ID: aqina-chicken-essence
  REGION: asia-southeast1
  SERVICE_NAME: aqina-backend-api
  IMAGE_NAME: asia-southeast1-docker.pkg.dev/aqina-chicken-essence/aqina-repo/backend

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Deployment Target
        id: resolve
        run: |
          PLATFORM=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.platform || 'cloud_run')")
          PROJECT=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.projectId || '${{ env.PROJECT_ID }}')")
          REGION=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.region || '${{ env.REGION }}')")
          SERVICE=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.service || '${{ env.SERVICE_NAME }}')")
          IMAGE=$(node -e "const cfg=require('./deployment-targets.json');console.log(cfg.backend?.image || '${{ env.IMAGE_NAME }}')")
          echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"
          echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
          echo "region=$REGION" >> "$GITHUB_OUTPUT"
          echo "service=$SERVICE" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Skip Non-Cloud-Run Backend
        if: steps.resolve.outputs.platform != 'cloud_run'
        run: echo "Backend target is '${{ steps.resolve.outputs.platform }}'. Skipping Cloud Run deploy."

      - name: Google Auth
        if: steps.resolve.outputs.platform == 'cloud_run'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Set up Cloud SDK
        if: steps.resolve.outputs.platform == 'cloud_run'
        uses: google-github-actions/setup-gcloud@v2

      - name: Select GCP Project
        if: steps.resolve.outputs.platform == 'cloud_run'
        run: gcloud config set project ${{ steps.resolve.outputs.project }}

      - name: Authorize Docker
        if: steps.resolve.outputs.platform == 'cloud_run'
        run: gcloud auth configure-docker asia-southeast1-docker.pkg.dev

      - name: Build and Push Container
        if: steps.resolve.outputs.platform == 'cloud_run'
        run: |-
          docker build -t ${{ steps.resolve.outputs.image }}:${{ github.sha }} ./backend
          docker push ${{ steps.resolve.outputs.image }}:${{ github.sha }}

      - name: Deploy to Cloud Run
        if: steps.resolve.outputs.platform == 'cloud_run'
        run: |-
          gcloud run deploy ${{ steps.resolve.outputs.service }} \
            --image ${{ steps.resolve.outputs.image }}:${{ github.sha }} \
            --region ${{ steps.resolve.outputs.region }} \
            --platform managed \
            --allow-unauthenticated
